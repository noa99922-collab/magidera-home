<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>過去の作品 - Magidera</title><link rel="stylesheet" href="css/style.css"></head><body><header><nav class="navbar"><div class="container"><h1 class="logo">Magidera</h1><ul class="nav-menu"><li><a href="index.html">ホーム</a></li><li><a href="members.html">団員紹介</a></li><li><a href="works.html" class="active">過去の作品</a></li><li><a href="contact.html">お問い合わせ</a></li><li><a href="shop.html">物販</a></li></ul></div></nav></header><main><section class="section works-section"><div class="container"><h2>🎬 過去の作品</h2><p class="section-description">Magideraのこれまでの作品をご紹介します。</p><div class="works-list" id="worksContainer"></div></div></section></main><footer><div class="container"><p>&copy; 2026 Magidera. All rights reserved.</p><ul class="footer-links"><li><a href="contact.html">お問い合わせ</a></li><li><a href="#">プライバシーポリシー</a></li></ul></div></footer><script src="js/main.js"></script><script>fetch('data/works.json').then(response => response.json()).then(data => {const container = document.getElementById('worksContainer');data.works.forEach(work => {const workItem = document.createElement('div');workItem.className = 'work-item';workItem.innerHTML = `<div class="work-content"><h3>${work.title}</h3><p class="work-year">${work.year}年</p><p class="work-description">${work.description}</p>${work.video_link ? `<a href="${work.video_link}" target="_blank" class="work-link">映像を見る →</a>` : ''}</div>${work.image ? `<div class="work-image"><img src="${work.image}" alt="${work.title}"></div>` : ''}`;container.appendChild(workItem);});});</script></body></html>
