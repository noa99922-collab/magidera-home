<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ - Magidera</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- ヘッダー -->
    <header>
        <nav class="navbar">
            <div class="container">
                <h1 class="logo">Magidera</h1>
                <ul class="nav-menu">
                    <li><a href="index.html">ホーム</a></li>
                    <li><a href="members.html">団員紹介</a></li>
                    <li><a href="works.html">過去の作品</a></li>
                    <li><a href="contact.html" class="active">お問い合わせ</a></li>
                    <li><a href="shop.html">物販</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <!-- メインコンテンツ -->
    <main>
        <section class="section contact-section">
            <div class="container">
                <h2>📧 お問い合わせ</h2>
                <p class="section-description">仕事依頼、出演相談、その他ご質問はこちらからお願いします。</p>
                
                <div class="contact-form-wrapper">
                    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="contact-form">
                        <div class="form-group">
                            <label for="name">お名前 *</label>
                            <input type="text" id="name" name="name" required>
                        </div>

                        <div class="form-group">
                            <label for="email">メールアドレス *</label>
                            <input type="email" id="email" name="email" required>
                        </div>

                        <div class="form-group">
                            <label for="phone">電話番号</label>
                            <input type="tel" id="phone" name="phone">
                        </div>

                        <div class="form-group">
                            <label for="category">お問い合わせ種別 *</label>
                            <select id="category" name="category" required>
                                <option value="">選択してください</option>
                                <option value="work">仕事依頼</option>
                                <option value="performance">出演相談</option>
                                <option value="workshop">ワークショップ参加</option>
                                <option value="other">その他</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="message">メッセージ *</label>
                            <textarea id="message" name="message" rows="6" required></textarea>
                        </div>

                        <button type="submit" class="btn-submit">送信</button>
                    </form>
                </div>

                <div class="contact-info">
                    <h3>その他のお問い合わせ方法</h3>
                    <p>Googleフォームでのお問い合わせも受け付けています：</p>
                    <a href="#" class="btn-secondary">Googleフォーム</a>
                </div>
            </div>
        </section>
    </main>

    <!-- フッター -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Magidera. All rights reserved.</p>
            <ul class="footer-links">
                <li><a href="contact.html">お問い合わせ</a></li>
                <li><a href="#">プライバシーポリシー</a></li>
            </ul>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
